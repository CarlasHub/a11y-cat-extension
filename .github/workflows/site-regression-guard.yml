name: Site regression guard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  site-regression-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run site regression guard
        run: node scripts/check-site-regression.mjs
